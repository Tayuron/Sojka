<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOJKA IQ TEST v2.6</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23ff2fb0' stroke='%23241226' stroke-width='1' d='M12 2C7.58 2 4 5.58 4 10c0 5.25 6.5 11.5 7.06 12.02a1.4 1.4 0 0 0 1.88 0C13.5 21.5 20 15.25 20 10c0-4.42-3.58-8-8-8zm0 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6z'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream: #fbf6ec;
    --cream-2: #f3ead6;
    --navbar-pink: #ff5fb0;
    --neon-green: #16b83e;
    --toxic-pink: #ff2fb0;
    --acid-yellow: #f6b800;
    --panel-border: #2c1240;
    --ink: #241226;
    --text-main: #241226;
    --shadow-hard: 6px 6px 0 rgba(36,18,38,0.85);
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    min-height:100vh;
    background: repeating-linear-gradient(135deg, var(--cream) 0px, var(--cream) 22px, var(--cream-2) 22px, var(--cream-2) 24px);
    color: var(--text-main);
    font-family:'Space Mono', monospace;
    overflow-x:hidden;
    position:relative;
  }

  h1,h2,.mega{
    font-family:'Bungee', sans-serif;
    text-transform:uppercase;
    letter-spacing:1px;
  }

  /* ---------- NAVBAR ---------- */
  #navbar{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:64px;
    background: var(--navbar-pink);
    border-bottom: 4px solid var(--ink);
    z-index: 400;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 0 18px;
  }
  #navbar-title{
    font-family:'Bungee', sans-serif;
    color:#fff;
    font-size: 1rem;
    text-shadow: 2px 2px 0 var(--ink);
    letter-spacing: 1px;
  }

  /* ---------- LANGUAGE SWITCHER ---------- */
  #lang-switcher{
    font-family:'Space Mono', monospace;
  }
  #lang-switcher select{
    background: #fff;
    color: var(--ink);
    border: 3px solid var(--ink);
    border-radius: 6px;
    padding: 8px 10px;
    font-weight:700;
    font-size: 0.85rem;
    box-shadow: 3px 3px 0 rgba(36,18,38,0.6);
    cursor:pointer;
  }

  /* ---------- LAYOUT ---------- */
  .screen{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding: 90px 20px 40px;
    text-align:center;
  }
  .hidden{display:none !important;}

  /* ---------- LOBBY BACKGROUND (Fruit Ninja style) ---------- */
  #screen-home{
    position:relative;
    overflow:hidden;
    background: linear-gradient(180deg, #ffd3ec 0%, #ffe9d2 45%, var(--cream) 85%);
  }
  .mountain-decor{
    position:absolute;
    bottom:0; left:0; right:0;
    height: 160px;
    background: linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(90,55,110,0.28) 100%);
    clip-path: polygon(0 100%, 0 62%, 8% 42%, 18% 66%, 30% 28%, 44% 63%, 56% 22%, 68% 58%, 80% 33%, 90% 60%, 100% 40%, 100% 100%);
    z-index:0;
  }
  .petals{
    position:absolute;
    inset:0;
    overflow:hidden;
    z-index:0;
    pointer-events:none;
  }
  .petal{
    position:absolute;
    top:-40px;
    animation-name: petal-fall;
    animation-timing-function: linear;
    animation-iteration-count: infinite;
    opacity:0.85;
  }
  @keyframes petal-fall{
    0%{ transform: translateY(-10vh) translateX(0) rotate(0deg); }
    100%{ transform: translateY(115vh) translateX(40px) rotate(360deg); }
  }

  /* ---------- LOGO ---------- */
  .logo-wrap{ margin-bottom: 4px; position:relative; z-index:2; }
  #logo-main{
    font-family:'Bungee', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 1px;
    display:flex;
    justify-content:center;
  }
  #logo-main span{
    display:inline-block;
    text-shadow: 3px 3px 0 rgba(36,18,38,0.25);
    animation: logoBounce 1.6s ease-in-out infinite;
  }
  @keyframes logoBounce{
    0%,100%{ transform: translateY(0); }
    50%{ transform: translateY(-8px); }
  }
  #logo-sub{
    font-family:'Bungee', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    opacity:0.75;
    margin-bottom: 12px;
  }

  .panel{
    position:relative;
    z-index:2;
    background: #fffdf8;
    border: 3px solid var(--panel-border);
    border-radius: 18px;
    box-shadow: var(--shadow-hard);
    padding: 30px 26px;
    max-width: 640px;
    width:100%;
  }

  /* ---------- BUTTONS ---------- */
  .btn{
    font-family:'Bungee', sans-serif;
    font-size: 1rem;
    color: #fff;
    background: var(--neon-green);
    border: 3px solid var(--ink);
    border-radius: 10px;
    padding: 14px 22px;
    margin: 10px 6px;
    cursor: pointer;
    box-shadow: var(--shadow-hard);
    transition: transform 0.12s ease;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
  }
  .btn:hover{
    animation: shake 0.35s ease infinite;
    filter: brightness(1.1);
  }
  .btn:active{ transform: translate(3px,3px); box-shadow: 2px 2px 0 rgba(36,18,38,0.85);}
  .btn.pink{ background: var(--toxic-pink); color:#fff;}
  .btn.yellow{ background: var(--acid-yellow); color: var(--ink); text-shadow:none;}
  .btn.ghost{
    background: #cfc7c2;
    color: #4a4450;
    border-color: #4a4450;
    font-family:'Space Mono', monospace;
    font-size: 0.8rem;
    box-shadow: none;
    position: absolute;
  }
  .btn.lobby-btn{
    background: #e8e0d4;
    color: var(--ink);
    border: 3px solid var(--ink);
    font-family:'Space Mono', monospace;
    font-size: 0.8rem;
    box-shadow: 3px 3px 0 rgba(36,18,38,0.5);
    display:block;
    margin: 18px auto 0;
  }

  @keyframes shake{
    0%,100%{ transform: rotate(0deg); }
    25%{ transform: rotate(-3deg); }
    75%{ transform: rotate(3deg); }
  }

  @keyframes blink{
    0%,100%{ opacity:1; }
    50%{ opacity:0.25; }
  }
  .blink{ animation: blink 1.1s steps(2,end) infinite; }

  /* ---------- SOJKA IMAGE ---------- */
  .sojka-wrap{
    position:relative;
    width: 180px;
    height: 180px;
    margin: 10px auto 18px;
  }
  #sojka-img{
    width:100%;
    height:100%;
    object-fit: cover;
    border-radius: 50%;
    border: 5px solid var(--navbar-pink);
    cursor:pointer;
    animation: pulseglow 1.6s ease-in-out infinite;
  }
  @keyframes pulseglow{
    0%,100%{ box-shadow: 0 0 12px 4px var(--neon-green), 0 0 30px 8px rgba(22,184,62,0.35); }
    50%{ box-shadow: 0 0 24px 10px var(--toxic-pink), 0 0 45px 16px rgba(255,47,176,0.45); }
  }
  #sojka-caption{
    font-size: 0.75rem;
    color:#8a7e6e;
    margin-top: -6px;
    margin-bottom: 10px;
  }

  #secret-level-text{
    margin-top: 8px;
    color: var(--acid-yellow);
    font-weight:700;
    font-size: 0.85rem;
  }

  /* ---------- MODAL ---------- */
  #disclaimer-overlay{
    position: fixed;
    inset:0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 20px;
  }
  #disclaimer-box{
    max-width: 560px;
    text-align:left;
    border: 4px solid var(--toxic-pink);
  }
  #disclaimer-box p{
    line-height:1.5;
    font-size: 0.92rem;
  }
  #disclaimer-box .btn-row{
    text-align:center;
    margin-top: 18px;
  }

  /* ---------- QUIZ ---------- */
  #quiz-counter{
    font-size: 0.85rem;
    color: var(--acid-yellow);
    margin-bottom: 10px;
  }
  #quiz-question{
    font-size: 1.15rem;
    margin-bottom: 20px;
    line-height:1.4;
  }
  .answer-btn{
    display:block;
    width:100%;
    text-align:left;
    background: var(--cream-2);
    border: 3px solid var(--neon-green);
    color: var(--text-main);
    border-radius: 10px;
    padding: 12px 14px;
    margin: 8px 0;
    font-family:'Space Mono', monospace;
    font-size: 0.95rem;
    cursor:pointer;
    transition: 0.15s;
  }
  .answer-btn:hover{
    background: var(--neon-green);
    color: #fff;
    transform: translateX(4px);
  }

  /* ---------- RESULT ---------- */
  #result-phrase{
    font-size: 1.2rem;
    margin: 18px 0;
    color: var(--acid-yellow);
    font-weight:700;
  }

  footer.mini{
    font-size: 0.7rem;
    opacity:0.5;
    margin-top: 30px;
  }

  /* ---------- MODE SELECT (Fruit Ninja style rings) ---------- */
  #mode-select-title{
    font-family:'Bungee', sans-serif;
    font-size: 0.9rem;
    color: var(--navbar-pink);
    margin: 22px 0 26px;
    letter-spacing: 1px;
  }
  .mode-grid{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap: 26px;
    margin-bottom: 34px;
  }
  .mode-item{
    position:relative;
    padding-bottom: 24px;
  }
  .mode-circle{
    position:relative;
    width: 96px;
    height: 96px;
    border-radius: 50%;
    border: 5px solid var(--neon-green);
    background: #fffdf8;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 2.1rem;
    cursor:pointer;
    box-shadow: var(--shadow-hard);
    transition: transform 0.15s ease;
    user-select:none;
  }
  .mode-circle:hover{ transform: scale(1.06); }
  .mode-circle.locked{ filter: grayscale(0.35); opacity: 0.9; }
  .mode-circle.pressed{ animation: pressPunch 0.28s ease; }
  @keyframes pressPunch{
    0%{ transform: scale(1); }
    40%{ transform: scale(0.82) rotate(-5deg); }
    70%{ transform: scale(1.05) rotate(3deg); }
    100%{ transform: scale(1); }
  }
  .mode-lock-badge{
    position:absolute;
    top:-6px;
    right:-6px;
    background: var(--ink);
    color:#fff;
    border-radius:50%;
    width: 28px;
    height: 28px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 0.85rem;
    border: 3px solid #fffdf8;
  }
  .mode-soon-ribbon{
    position:absolute;
    bottom: 6px;
    left:50%;
    transform: translateX(-50%);
    background: var(--toxic-pink);
    color:#fff;
    font-size: 0.5rem;
    font-family:'Space Mono', monospace;
    font-weight:700;
    padding: 2px 6px;
    border-radius: 6px;
    white-space:nowrap;
  }
  .mode-label{
    position:absolute;
    bottom: -22px;
    left:50%;
    transform: translateX(-50%);
    font-family:'Bungee', sans-serif;
    font-size: 0.62rem;
    color: var(--ink);
    white-space:nowrap;
  }

  /* ---------- LOCKED TOAST ---------- */
  #locked-toast{
    position:fixed;
    bottom: 30px;
    left:50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color:#fff;
    padding: 14px 22px;
    border-radius: 12px;
    font-family:'Bungee', sans-serif;
    font-size: 0.8rem;
    box-shadow: var(--shadow-hard);
    opacity:0;
    pointer-events:none;
    transition: 0.25s ease;
    z-index: 700;
    text-align:center;
    max-width: 82vw;
  }
  #locked-toast.show{
    opacity:1;
    transform: translateX(-50%) translateY(0);
  }

  /* ---------- PSYCHEDELIC EASTER EGG ---------- */
  .psychedelic{
    animation: psycho 0.4s linear infinite;
  }
  @keyframes psycho{
    0%{ background: linear-gradient(45deg, #ff2fb0, #39ff14); }
    25%{ background: linear-gradient(135deg, #f6ff2f, #ff2fb0); }
    50%{ background: linear-gradient(225deg, #39ff14, #f6ff2f); }
    75%{ background: linear-gradient(315deg, #ff2fb0, #39ff14); }
    100%{ background: linear-gradient(45deg, #39ff14, #ff2fb0); }
  }

  /* ---------- SELF DESTRUCT SCREEN ---------- */
  .boom-screen{
    background: #ff0000 !important;
    color: #fff !important;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding: 40px;
    font-family:'Bungee', sans-serif;
    font-size: 1.6rem;
    line-height:1.5;
  }

  @media (max-width: 480px){
    .panel{ padding: 20px 16px; }
    h1{ font-size:1.4rem; }
    #quiz-question{ font-size: 1rem; }
  }
</style>
</head>
<body>

<!-- ===================== NAVBAR ===================== -->
<div id="navbar">
  <div id="navbar-title">🐦 SOJKA IQ TEST</div>
  <div id="lang-switcher">
    <select id="lang-select" onchange="setLanguage(this.value)">
      <option value="sk">SK (Slovenský Mozog)</option>
      <option value="ru" selected>RU (Базированный Русский)</option>
      <option value="en">EN (GigaChad English)</option>
    </select>
  </div>
</div>

<!-- ===================== DISCLAIMER MODAL ===================== -->
<div id="disclaimer-overlay">
  <div class="panel" id="disclaimer-box">
    <h2 style="color:var(--toxic-pink)" id="disclaimer-title">WARNING</h2>
    <p id="disclaimer-text"></p>
    <div class="btn-row">
      <button class="btn" id="btn-human" onclick="enterAsHuman()"></button>
      <button class="btn pink" id="btn-sojka" onclick="enterAsSojka()"></button>
    </div>
  </div>
</div>

<!-- ===================== MAIN CONTENT ROOT ===================== -->
<div id="app-root">

  <!-- ---- HOME SCREEN ---- -->
  <section class="screen" id="screen-home">
    <div class="petals" id="petals"></div>
    <div class="mountain-decor"></div>

    <div class="panel">
      <div class="logo-wrap">
        <div id="logo-main"></div>
        <div id="logo-sub" class="blink"></div>
      </div>

      <div class="sojka-wrap">
        <img id="sojka-img" src="" alt="Matej Sojka" onclick="handleSojkaClick()">
      </div>
      <div id="sojka-caption"></div>
      <div id="secret-level-text" class="hidden"></div>

      <p id="home-subtitle"></p>

      <div id="mode-select-title"></div>
      <div class="mode-grid" id="mode-grid"></div>

      <button class="btn ghost" id="btn-escape" onmouseover="runAway(this)"></button>
    </div>
  </section>

  <!-- ---- LOCKED MODE TOAST ---- -->
  <div id="locked-toast"></div>

  <!-- ---- QUIZ SCREEN ---- -->
  <section class="screen hidden" id="screen-quiz">
    <div class="panel">
      <div id="quiz-counter"></div>
      <div id="quiz-question"></div>
      <div id="quiz-answers"></div>
      <button class="btn lobby-btn" id="btn-lobby-quiz" onclick="goToLobby()"></button>
    </div>
  </section>

  <!-- ---- RESULT SCREEN ---- -->
  <section class="screen hidden" id="screen-result">
    <div class="panel">
      <h2 id="result-title"></h2>
      <div id="result-phrase"></div>
      <button class="btn yellow" id="btn-restart" onclick="restartQuiz()"></button>
      <button class="btn lobby-btn" id="btn-lobby-result" onclick="goToLobby()"></button>
    </div>
  </section>

  <footer class="mini">Sojka IQ Test v2.6 — nobody has ever failed this test.</footer>
</div>

  }
  // если экран результата открыт - оставляем ту же фразу, но переводим её по индексу
  if (!document.getElementById("screen-result").classList.contains("hidden")){
    renderResultText();
  }
}

function renderStaticTexts(){
  const t = i18n[currentLang];

  document.getElementById("disclaimer-title").textContent = t.disclaimerTitle;
  document.getElementById("disclaimer-text").textContent = t.disclaimerText;
  document.getElementById("btn-human").textContent = t.btnHuman;
  document.getElementById("btn-sojka").textContent = t.btnSojka;

  document.getElementById("logo-sub").textContent = t.homeTitle;
  document.getElementById("home-subtitle").textContent = t.homeSubtitle;
  document.getElementById("mode-select-title").textContent = t.selectModeTitle;
  document.getElementById("btn-escape").textContent = t.escapeBtn;

  document.getElementById("result-title").textContent = t.resultTitle;
  document.getElementById("btn-restart").textContent = t.restartBtn;
  document.getElementById("btn-lobby-quiz").textContent = t.backToLobby;
  document.getElementById("btn-lobby-result").textContent = t.backToLobby;

  const secretEl = document.getElementById("secret-level-text");
  if (!secretEl.classList.contains("hidden")){
    secretEl.textContent = t.secretLevel;
  }

  renderModes();
}

/* =========================================================================
   5. ЭТАП 1 — ДИСКЛЕЙМЕР
   ========================================================================= */
function enterAsHuman(){
  document.getElementById("disclaimer-overlay").classList.add("hidden");
}

function enterAsSojka(){
  const t = i18n[currentLang];
  document.body.innerHTML = `<div class="boom-screen">${t.boomText}</div>`;
  document.body.classList.add("boom-screen");
}

/* =========================================================================
   5.5 ВЫБОР РЕЖИМА (Fruit Ninja style rings)
   ========================================================================= */
const modeList = [
  { id: "classic",     emoji: "🧠", color: "var(--neon-green)",  locked: false, label: "CLASSIC" },
  { id: "zen",         emoji: "🧘", color: "#39c6ff",             locked: true,  label: "ZEN" },
  { id: "arcade",      emoji: "🕹️", color: "var(--acid-yellow)", locked: true,  label: "ARCADE" },
  { id: "multiplayer", emoji: "👥", color: "#5f6bff",             locked: true,  label: "MULTIPLAYER" },
  { id: "challenge",   emoji: "🏆", color: "var(--toxic-pink)",   locked: true,  label: "CHALLENGE" },
  { id: "event",       emoji: "🎆", color: "#ff8a3d",             locked: true,  label: "EVENT" }
];

function renderModes(){
  const grid = document.getElementById("mode-grid");
  if (!grid) return;
  grid.innerHTML = "";

  modeList.forEach((mode) => {
    const item = document.createElement("div");
    item.className = "mode-item";

    const circle = document.createElement("div");
    circle.className = "mode-circle" + (mode.locked ? " locked" : "");
    circle.style.borderColor = mode.color;
    circle.textContent = mode.emoji;
    circle.onclick = () => handleModeClick(mode, circle);

    if (mode.locked){
      const lock = document.createElement("div");
      lock.className = "mode-lock-badge";
      lock.textContent = "🔒";
      circle.appendChild(lock);

      const ribbon = document.createElement("div");
      ribbon.className = "mode-soon-ribbon";
      ribbon.textContent = i18n[currentLang].comingSoonLabel;
      circle.appendChild(ribbon);
    }

    const label = document.createElement("div");
    label.className = "mode-label";
    label.textContent = mode.label;

    item.appendChild(circle);
    item.appendChild(label);
    grid.appendChild(item);
  });
}

function handleModeClick(mode, circleEl){
  // анимация "тыка" при любом клике, разблокированном или нет
  circleEl.classList.remove("pressed");
  void circleEl.offsetWidth; // reflow, чтобы анимация перезапустилась при повторных кликах
  circleEl.classList.add("pressed");

  if (mode.locked){
    showLockedToast();
  } else {
    startQuiz();
  }
}

let lockedToastTimeout;
function showLockedToast(){
  const toast = document.getElementById("locked-toast");
  toast.textContent = i18n[currentLang].lockedMsg;
  toast.classList.add("show");
  clearTimeout(lockedToastTimeout);
  lockedToastTimeout = setTimeout(() => toast.classList.remove("show"), 2200);
}


/* =========================================================================
   6. ЭТАП 2/3 — ЗАПУСК И ПРОХОЖДЕНИЕ КВИЗА
   ========================================================================= */
function shuffleFisherYates(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz(){
  currentQuizSet = shuffleFisherYates(questionBank).slice(0, 10);
  currentIndex = 0;
  document.getElementById("screen-home").classList.add("hidden");
  document.getElementById("screen-result").classList.add("hidden");
  document.getElementById("screen-quiz").classList.remove("hidden");
  renderQuestion();
}

function renderQuestion(){
  const t = i18n[currentLang];
  const q = currentQuizSet[currentIndex];

  document.getElementById("quiz-counter").textContent = t.quizCounter(currentIndex + 1);
  document.getElementById("quiz-question").textContent = q.text[currentLang];

  const answersWrap = document.getElementById("quiz-answers");
  answersWrap.innerHTML = "";
  q.answers[currentLang].forEach((ansText) => {
    const btn = document.createElement("button");
    btn.className = "answer-btn";
    btn.textContent = ansText;
    btn.onclick = nextQuestion;
    answersWrap.appendChild(btn);
  });
}

function nextQuestion(){
  currentIndex++;
  if (currentIndex >= currentQuizSet.length){
    showResult();
  } else {
    renderQuestion();
  }
}

/* =========================================================================
   7. ЭТАП 4 — РЕЗУЛЬТАТ (ошибки всегда игнорируются)
   ========================================================================= */
let lastResultIndex = 0;

function showResult(){
  lastResultIndex = Math.floor(Math.random() * i18n[currentLang].results.length);
  document.getElementById("screen-quiz").classList.add("hidden");
  document.getElementById("screen-result").classList.remove("hidden");
  renderResultText();
}

function renderResultText(){
  const t = i18n[currentLang];
  document.getElementById("result-phrase").textContent = t.results[lastResultIndex];
}

function restartQuiz(){
  document.getElementById("screen-result").classList.add("hidden");
  startQuiz();
}

function goToLobby(){
  document.getElementById("screen-quiz").classList.add("hidden");
  document.getElementById("screen-result").classList.add("hidden");
  document.getElementById("screen-home").classList.remove("hidden");
}

/* =========================================================================
   8. ПАСХАЛКИ
   ========================================================================= */

// 8.1 Клик по лицу Сойки 10 раз -> психоделика + скрытый текст
// (обычные клики до этого просто листают его фотки, как в тиндере, только без свайпа вправо)
let currentPhotoIndex = 0;

function setRandomSojkaPhoto(){
  currentPhotoIndex = Math.floor(Math.random() * sojkaPhotos.length);
  document.getElementById("sojka-img").src = sojkaPhotos[currentPhotoIndex];
  renderSojkaCaption();
}

function cyclePhoto(){
  currentPhotoIndex = (currentPhotoIndex + 1) % sojkaPhotos.length;
  document.getElementById("sojka-img").src = sojkaPhotos[currentPhotoIndex];
  renderSojkaCaption();
}

function renderSojkaCaption(){
  const captions = i18n[currentLang].photoCaptions;
  document.getElementById("sojka-caption").textContent = captions[currentPhotoIndex];
}

function handleSojkaClick(){
  cyclePhoto();
  sojkaClickCount++;
  if (sojkaClickCount === 10){
    document.body.classList.add("psychedelic");
    const secretEl = document.getElementById("secret-level-text");
    secretEl.textContent = i18n[currentLang].secretLevel;
    secretEl.classList.remove("hidden");
    setTimeout(() => {
      document.body.classList.remove("psychedelic");
    }, 3000);
    sojkaClickCount = 0;
  }
}

// 8.2 Кнопка "Признать Сойку гением" убегает от курсора
function runAway(btn){
  const maxX = window.innerWidth - btn.offsetWidth - 20;
  const maxY = window.innerHeight - btn.offsetHeight - 20;
  const newX = Math.max(10, Math.floor(Math.random() * maxX));
  const newY = Math.max(80, Math.floor(Math.random() * maxY));
  btn.style.left = newX + "px";
  btn.style.top = newY + "px";
  btn.style.position = "absolute";
}

/* =========================================================================
   9. INIT
   ========================================================================= */
function renderLogo(){
  const el = document.getElementById("logo-main");
  if (!el) return;
  const word = "SOJKA";
  const colors = ["var(--neon-green)", "var(--toxic-pink)", "var(--acid-yellow)", "var(--navbar-pink)", "#5f6bff"];
  el.innerHTML = "";
  word.split("").forEach((ch, i) => {
    const span = document.createElement("span");
    span.textContent = ch;
    span.style.color = colors[i % colors.length];
    span.style.animationDelay = (i * 0.1) + "s";
    el.appendChild(span);
  });
}

function renderPetals(){
  const container = document.getElementById("petals");
  if (!container) return;
  container.innerHTML = "";
  const count = 12;
  for (let i = 0; i < count; i++){
    const p = document.createElement("div");
    p.className = "petal";
    p.textContent = "🌸";
    p.style.left = Math.random() * 100 + "%";
    const duration = 9 + Math.random() * 8;
    p.style.animationDuration = duration + "s";
    p.style.animationDelay = (Math.random() * duration) + "s";
    p.style.fontSize = (0.8 + Math.random() * 0.9) + "rem";
    container.appendChild(p);
  }
}

window.addEventListener("DOMContentLoaded", () => {
  renderStaticTexts();
  setRandomSojkaPhoto();
  renderLogo();
  renderPetals();
});
</script>
