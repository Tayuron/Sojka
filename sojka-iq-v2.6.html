<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>SOJKA IQ TEST v2.6</title>
		<link
			rel="icon"
			type="image/svg+xml"
			href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23ff2fb0' stroke='%23241226' stroke-width='1' d='M12 2C7.58 2 4 5.58 4 10c0 5.25 6.5 11.5 7.06 12.02a1.4 1.4 0 0 0 1.88 0C13.5 21.5 20 15.25 20 10c0-4.42-3.58-8-8-8zm0 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6z'/%3E%3C/svg%3E"
		/>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link
			href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Mono:wght@400;700&display=swap"
			rel="stylesheet"
		/>
		<style>
			:root {
				--cream: #fbf6ec;
				--cream-2: #f3ead6;
				--navbar-pink: #ff5fb0;
				--neon-green: #16b83e;
				--toxic-pink: #ff2fb0;
				--acid-yellow: #f6b800;
				--panel-border: #2c1240;
				--ink: #241226;
				--text-main: #241226;
				--shadow-hard: 6px 6px 0 rgba(36, 18, 38, 0.85);
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				background: repeating-linear-gradient(
					135deg,
					var(--cream) 0px,
					var(--cream) 22px,
					var(--cream-2) 22px,
					var(--cream-2) 24px
				);
				color: var(--text-main);
				font-family: 'Space Mono', monospace;
				overflow-x: hidden;
				position: relative;
			}

			h1,
			h2,
			.mega {
				font-family: 'Bungee', sans-serif;
				text-transform: uppercase;
				letter-spacing: 1px;
			}

			/* ---------- ALARM ALARM FLASHING ---------- */
			@keyframes fast-red-flash {
				0%,
				100% {
					background-color: #ff0000;
				}
				50% {
					background-color: #000000;
				}
			}
			body.alarm-active {
				animation: fast-red-flash 0.05s infinite !important;
				overflow: hidden;
			}
			body.alarm-active * {
				color: #fff !important;
				text-shadow: 0 0 10px #ff0000;
			}

			/* ---------- NAVBAR ---------- */
			#navbar {
				position: fixed;
				top: 0;
				left: 0;
				right: 0;
				height: 64px;
				background: var(--navbar-pink);
				border-bottom: 4px solid var(--ink);
				z-index: 400;
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 0 18px;
			}
			#navbar-title {
				font-family: 'Bungee', sans-serif;
				color: #fff;
				font-size: 1rem;
				text-shadow: 2px 2px 0 var(--ink);
				letter-spacing: 1px;
			}

			/* ---------- LANGUAGE SWITCHER ---------- */
			#lang-switcher {
				font-family: 'Space Mono', monospace;
			}
			#lang-switcher select {
				background: #fff;
				color: var(--ink);
				border: 3px solid var(--ink);
				border-radius: 6px;
				padding: 8px 10px;
				font-weight: 700;
				font-size: 0.85rem;
				box-shadow: 3px 3px 0 rgba(36, 18, 38, 0.6);
				cursor: pointer;
			}

			/* ---------- LAYOUT ---------- */
			.screen {
				min-height: 100vh;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				padding: 90px 20px 40px;
				text-align: center;
			}
			.hidden {
				display: none !important;
			}

			/* ---------- LOBBY BACKGROUND (Fruit Ninja style) ---------- */
			#screen-home {
				position: relative;
				overflow: hidden;
				background: linear-gradient(
					180deg,
					#ffd3ec 0%,
					#ffe9d2 45%,
					var(--cream) 85%
				);
			}
			.mountain-decor {
				position: absolute;
				bottom: 0;
				left: 0;
				right: 0;
				height: 160px;
				background: linear-gradient(
					180deg,
					rgba(255, 255, 255, 0) 0%,
					rgba(90, 55, 110, 0.28) 100%
				);
				clip-path: polygon(
					0 100%,
					0 62%,
					8% 42%,
					18% 66%,
					30% 28%,
					44% 63%,
					56% 22%,
					68% 58%,
					80% 33%,
					90% 60%,
					100% 40%,
					100% 100%
				);
				z-index: 0;
			}
			.petals {
				position: absolute;
				inset: 0;
				overflow: hidden;
				z-index: 0;
				pointer-events: none;
			}
			.petal {
				position: absolute;
				top: -40px;
				animation-name: petal-fall;
				animation-timing-function: linear;
				animation-iteration-count: infinite;
				opacity: 0.85;
			}
			@keyframes petal-fall {
				0% {
					transform: translateY(-10vh) translateX(0) rotate(0deg);
				}
				100% {
					transform: translateY(115vh) translateX(40px) rotate(360deg);
				}
			}

			/* ---------- LOGO ---------- */
			.logo-wrap {
				margin-bottom: 4px;
				position: relative;
				z-index: 2;
			}
			#logo-main {
				font-family: 'Bungee', sans-serif;
				font-size: 2.4rem;
				letter-spacing: 1px;
				display: flex;
				justify-content: center;
			}
			#logo-main span {
				display: inline-block;
				text-shadow: 3px 3px 0 rgba(36, 18, 38, 0.25);
				animation: logoBounce 1.6s ease-in-out infinite;
			}
			@keyframes logoBounce {
				0%,
				100% {
					transform: translateY(0);
				}
				50% {
					transform: translateY(-8px);
				}
			}
			#logo-sub {
				font-family: 'Bungee', sans-serif;
				font-size: 0.9rem;
				color: var(--ink);
				opacity: 0.75;
				margin-bottom: 12px;
			}

			.panel {
				position: relative;
				z-index: 2;
				background: #fffdf8;
				border: 3px solid var(--panel-border);
				border-radius: 18px;
				box-shadow: var(--shadow-hard);
				padding: 30px 26px;
				max-width: 640px;
				width: 100%;
			}

			/* ---------- MATEJ BADGE ---------- */
			.matej-badge {
				background: var(--acid-yellow);
				border: 3px solid var(--ink);
				border-radius: 8px;
				padding: 10px;
				font-family: 'Bungee', sans-serif;
				font-size: 0.9rem;
				margin: 15px auto;
				max-width: 320px;
				box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.2);
				cursor: pointer;
				transition: all 0.2s ease;
			}
			.matej-badge.gay-mode {
				background: var(--toxic-pink) !important;
				color: #fff !important;
				animation: spin-crazy 0.3s linear infinite !important;
				transform: scale(0.7);
			}
			@keyframes spin-crazy {
				100% {
					transform: rotate(360deg) scale(0.6);
				}
			}

			/* ---------- BUTTONS ---------- */
			.btn {
				font-family: 'Bungee', sans-serif;
				font-size: 1rem;
				color: #fff;
				background: var(--neon-green);
				border: 3px solid var(--ink);
				border-radius: 10px;
				padding: 14px 22px;
				margin: 10px 6px;
				cursor: pointer;
				box-shadow: var(--shadow-hard);
				transition: transform 0.12s ease;
				text-shadow: 1px 1px 0 rgba(0, 0, 0, 0.3);
			}
			.btn:hover {
				animation: shake 0.35s ease infinite;
				filter: brightness(1.1);
			}
			.btn:active {
				transform: translate(3px, 3px);
				box-shadow: 2px 2px 0 rgba(36, 18, 38, 0.85);
			}
			.btn.pink {
				background: var(--toxic-pink);
				color: #fff;
			}
			.btn.yellow {
				background: var(--acid-yellow);
				color: var(--ink);
				text-shadow: none;
			}
			.btn.ghost {
				background: #cfc7c2;
				color: #4a4450;
				border-color: #4a4450;
				font-family: 'Space Mono', monospace;
				font-size: 0.8rem;
				box-shadow: none;
				position: absolute;
			}
			.btn.lobby-btn {
				background: #e8e0d4;
				color: var(--ink);
				border: 3px solid var(--ink);
				font-family: 'Space Mono', monospace;
				font-size: 0.8rem;
				box-shadow: 3px 3px 0 rgba(36, 18, 38, 0.5);
				display: block;
				margin: 18px auto 0;
			}

			@keyframes shake {
				0%,
				100% {
					transform: rotate(0deg);
				}
				25% {
					transform: rotate(-3deg);
				}
				75% {
					transform: rotate(3deg);
				}
			}

			@keyframes blink {
				0%,
				100% {
					opacity: 1;
				}
				50% {
					opacity: 0.25;
				}
			}
			.blink {
				animation: blink 1.1s steps(2, end) infinite;
			}

			/* ---------- SOJKA IMAGE ---------- */
			.sojka-wrap {
				position: relative;
				width: 180px;
				height: 180px;
				margin: 10px auto 18px;
			}
			#sojka-img {
				width: 100%;
				height: 100%;
				object-fit: cover;
				border-radius: 50%;
				border: 5px solid var(--navbar-pink);
				cursor: pointer;
				animation: pulseglow 1.6s ease-in-out infinite;
			}
			@keyframes pulseglow {
				0%,
				100% {
					box-shadow:
						0 0 12px 4px var(--neon-green),
						0 0 30px 8px rgba(22, 184, 62, 0.35);
				}
				50% {
					box-shadow:
						0 0 24px 10px var(--toxic-pink),
						0 0 45px 16px rgba(255, 47, 176, 0.45);
				}
			}
			#sojka-caption {
				font-size: 0.75rem;
				color: #8a7e6e;
				margin-top: -6px;
				margin-bottom: 10px;
			}

			#secret-level-text {
				margin-top: 8px;
				color: var(--acid-yellow);
				font-weight: 700;
				font-size: 0.85rem;
			}

			/* ---------- MODAL ---------- */
			#disclaimer-overlay {
				position: fixed;
				inset: 0;
				background: rgba(0, 0, 0, 0.85);
				z-index: 1000;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 20px;
			}
			#disclaimer-box {
				max-width: 560px;
				text-align: left;
				border: 4px solid var(--toxic-pink);
			}
			#disclaimer-box p {
				line-height: 1.5;
				font-size: 0.92rem;
			}
			#disclaimer-box .btn-row {
				text-align: center;
				margin-top: 18px;
			}

			/* ---------- QUIZ ---------- */
			#quiz-counter {
				font-size: 0.85rem;
				color: var(--acid-yellow);
				margin-bottom: 10px;
			}
			#quiz-question {
				font-size: 1.15rem;
				margin-bottom: 20px;
				line-height: 1.4;
			}
			.answer-btn {
				display: block;
				width: 100%;
				text-align: left;
				background: var(--cream-2);
				border: 3px solid var(--neon-green);
				color: var(--text-main);
				border-radius: 10px;
				padding: 12px 14px;
				margin: 8px 0;
				font-family: 'Space Mono', monospace;
				font-size: 0.95rem;
				cursor: pointer;
				transition: 0.15s;
			}
			.answer-btn:hover {
				background: var(--neon-green);
				color: #fff;
				transform: translateX(4px);
			}

			/* ---------- RESULT ---------- */
			#result-phrase {
				font-size: 1.2rem;
				margin: 18px 0;
				color: var(--acid-yellow);
				font-weight: 700;
			}

			footer.mini {
				font-size: 0.7rem;
				opacity: 0.5;
				margin-top: 30px;
			}

			/* ---------- MODE SELECT (Fruit Ninja style rings) ---------- */
			#mode-select-title {
				font-family: 'Bungee', sans-serif;
				font-size: 0.9rem;
				color: var(--navbar-pink);
				margin: 22px 0 26px;
				letter-spacing: 1px;
			}
			.mode-grid {
				display: flex;
				flex-wrap: wrap;
				justify-content: center;
				gap: 26px;
				margin-bottom: 34px;
			}
			.mode-item {
				position: relative;
				padding-bottom: 24px;
			}
			.mode-circle {
				position: relative;
				width: 96px;
				height: 96px;
				border-radius: 50%;
				border: 5px solid var(--neon-green);
				background: #fffdf8;
				display: flex;
				align-items: center;
				justify-content: center;
				font-size: 2.1rem;
				cursor: pointer;
				box-shadow: var(--shadow-hard);
				transition: transform 0.15s ease;
				user-select: none;
			}
			.mode-circle:hover {
				transform: scale(1.06);
			}
			.mode-circle.locked {
				filter: grayscale(0.35);
				opacity: 0.9;
			}
			.mode-circle.pressed {
				animation: pressPunch 0.28s ease;
			}
			@keyframes pressPunch {
				0% {
					transform: scale(1);
				}
				40% {
					transform: scale(0.82) rotate(-5deg);
				}
				70% {
					transform: scale(1.05) rotate(3deg);
				}
				100% {
					transform: scale(1);
				}
			}
			.mode-lock-badge {
				position: absolute;
				top: -6px;
				right: -6px;
				background: var(--ink);
				color: #fff;
				border-radius: 50%;
				width: 28px;
				height: 28px;
				display: flex;
				align-items: center;
				justify-content: center;
				font-size: 0.85rem;
				border: 3px solid #fffdf8;
			}
			.mode-soon-ribbon {
				position: absolute;
				bottom: 6px;
				left: 50%;
				transform: translateX(-50%);
				background: var(--toxic-pink);
				color: #fff;
				font-size: 0.5rem;
				font-family: 'Space Mono', monospace;
				font-weight: 700;
				padding: 2px 6px;
				border-radius: 6px;
				white-space: nowrap;
			}
			.mode-label {
				position: absolute;
				bottom: -22px;
				left: 50%;
				transform: translateX(-50%);
				font-family: 'Bungee', sans-serif;
				font-size: 0.62rem;
				color: var(--ink);
				white-space: nowrap;
			}

			/* ---------- LOCKED TOAST ---------- */
			#locked-toast {
				position: fixed;
				bottom: 30px;
				left: 50%;
				transform: translateX(-50%) translateY(20px);
				background: var(--ink);
				color: #fff;
				padding: 14px 22px;
				border-radius: 12px;
				font-family: 'Bungee', sans-serif;
				font-size: 0.8rem;
				box-shadow: var(--shadow-hard);
				opacity: 0;
				pointer-events: none;
				transition: 0.25s ease;
				z-index: 700;
				text-align: center;
				max-width: 82vw;
			}
			#locked-toast.show {
				opacity: 1;
				transform: translateX(-50%) translateY(0);
			}

			/* ---------- PSYCHEDELIC EASTER EGG ---------- */
			.psychedelic {
				animation: psycho 0.4s linear infinite;
			}
			@keyframes psycho {
				0% {
					background: linear-gradient(45deg, #ff2fb0, #39ff14);
				}
				25% {
					background: linear-gradient(135deg, #f6ff2f, #ff2fb0);
				}
				50% {
					background: linear-gradient(225deg, #39ff14, #f6ff2f);
				}
				75% {
					background: linear-gradient(315deg, #ff2fb0, #39ff14);
				}
				100% {
					background: linear-gradient(45deg, #39ff14, #ff2fb0);
				}
			}

			/* ---------- SELF DESTRUCT SCREEN ---------- */
			.boom-screen {
				background: #ff0000 !important;
				color: #fff !important;
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				text-align: center;
				padding: 40px;
				font-family: 'Bungee', sans-serif;
				font-size: 1.6rem;
				line-height: 1.5;
			}

			@media (max-width: 480px) {
				.panel {
					padding: 20px 16px;
				}
				h1 {
					font-size: 1.4rem;
				}
				#quiz-question {
					font-size: 1rem;
				}
			}
		</style>
	</head>
	<body>
		<!-- ===================== NAVBAR ===================== -->
		<div id="navbar">
			<div id="navbar-title">🐦 SOJKA IQ TEST</div>
			<div id="lang-switcher">
				<select id="lang-select" onchange="setLanguage(this.value)">
					<option value="sk">SK (Slovenský Mozog)</option>
					<option value="ru" selected>RU (Базированный Русский)</option>
					<option value="en">EN (GigaChad English)</option>
				</select>
			</div>
		</div>

		<!-- ===================== DISCLAIMER MODAL ===================== -->
		<div id="disclaimer-overlay">
			<div class="panel" id="disclaimer-box">
				<h2 style="color: var(--toxic-pink)" id="disclaimer-title">WARNING</h2>
				<p id="disclaimer-text"></p>
				<div class="btn-row">
					<button class="btn" id="btn-human" onclick="enterAsHuman()"></button>
					<button
						class="btn pink"
						id="btn-sojka"
						onclick="enterAsSojka()"
					></button>
				</div>
			</div>
		</div>

		<!-- ===================== MAIN CONTENT ROOT ===================== -->
		<div id="app-root">
			<!-- ---- HOME SCREEN ---- -->
			<section class="screen" id="screen-home">
				<div class="petals" id="petals"></div>
				<div class="mountain-decor"></div>

				<div class="panel">
					<div class="logo-wrap">
						<div id="logo-main"></div>
						<div id="logo-sub" class="blink"></div>
					</div>

					<!-- ГЕНЕРАТОР ПЛАШЕК ПРО МАТЕЯ -->
					<div id="matej-badge" class="matej-badge" onclick="rollMatejBadge()">
						ПРИЗНАТЬ МАТЕЯ ГЕНИЕМ
					</div>

					<div class="sojka-wrap">
						<img
							id="sojka-img"
							src=""
							alt="Matej Sojka"
							onclick="handleSojkaClick()"
						/>
					</div>
					<div id="sojka-caption"></div>
					<div id="secret-level-text" class="hidden"></div>

					<p id="home-subtitle"></p>

					<div id="mode-select-title"></div>
					<div class="mode-grid" id="mode-grid"></div>

					<button
						class="btn ghost"
						id="btn-escape"
						onmouseover="runAway(this)"
					></button>
				</div>
			</section>

			<!-- ---- LOCKED MODE TOAST ---- -->
			<div id="locked-toast"></div>

			<!-- ---- QUIZ SCREEN ---- -->
			<section class="screen hidden" id="screen-quiz">
				<div class="panel">
					<div id="quiz-counter"></div>
					<div id="quiz-question"></div>
					<div id="quiz-answers"></div>
					<button
						class="btn lobby-btn"
						id="btn-lobby-quiz"
						onclick="goToLobby()"
					></button>
				</div>
			</section>

			<!-- ---- RESULT SCREEN ---- -->
			<section class="screen hidden" id="screen-result">
				<div class="panel">
					<h2 id="result-title"></h2>
					<div id="result-phrase"></div>
					<button
						class="btn yellow"
						id="btn-restart"
						onclick="restartQuiz()"
					></button>
					<button
						class="btn lobby-btn"
						id="btn-lobby-result"
						onclick="goToLobby()"
					></button>
				</div>
			</section>

			<footer class="mini">
				Sojka IQ Test v2.6 — nobody has ever failed this test.
			</footer>
		</div>

		<script>
			/* =========================================================================
   0. ФОТОБАНК СОЙКИ (base64, встроено — работает без внешних файлов)

			const resultsPhrases = {
				sk: [
					'Vaše IQ je menšie ako izbová teplota. Gratulujeme!',
					'Priemerný výkon. Matej Sojka je sklamaný, ale neurazený.',

			/* =========================================================================
   2. СТЕЙТ ПРИЛОЖЕНИЯ
   ========================================================================= */
			let currentLang = 'ru'
			let currentQuestionIndex = 0
			let score = 0

			/* =========================================================================
   3. ЛОГИКА И ДВИЖОК ТЕСТА
   ========================================================================= */
			function setLanguage(lang) {
				currentLang = lang
				const t = translations[lang]

				// Апдейт текстов
				document.getElementById('navbar-title').innerText = t.navTitle
				document.getElementById('disclaimer-title').innerText = t.discTitle
				document.getElementById('disclaimer-text').innerText = t.discText
				document.getElementById('btn-human').innerText = t.btnHuman
				document.getElementById('btn-sojka').innerText = t.btnSojka
				document.getElementById('logo-sub').innerText = t.logoSub
				document.getElementById('sojka-caption').innerText = t.caption
				document.getElementById('home-subtitle').innerText = t.subtitle
				document.getElementById('mode-select-title').innerText = t.modeTitle
				document.getElementById('btn-escape').innerText = t.escapeBtn
				document.getElementById('btn-lobby-quiz').innerText = t.lobbyBtn
				document.getElementById('btn-lobby-result').innerText = t.lobbyBtn
				document.getElementById('btn-restart').innerText = t.restartBtn

				// Рендер лого букв
				const logoMain = document.getElementById('logo-main')
				logoMain.innerHTML = ''
				'SOJKA IQ TEST'.split('').forEach((char, idx) => {
					const span = document.createElement('span')
					span.innerText = char === ' ' ? '\u00A0' : char
					span.style.animationDelay = `${idx * 0.1}s`
					logoMain.appendChild(span)
				})

				// Рендер режимов
				renderModes()
			}

			function renderModes() {
				const grid = document.getElementById('mode-grid')
				grid.innerHTML = ''

				modesData[currentLang].forEach(m => {
					const item = document.createElement('div')
					item.className = 'mode-item'

					const circle = document.createElement('div')
					circle.className = `mode-circle ${m.locked ? 'locked' : ''}`
					circle.innerText = m.icon
					circle.onclick = e => handleModeClick(m, circle, e)

					if (m.locked) {
						const lock = document.createElement('div')
						lock.className = 'mode-lock-badge'
						lock.innerText = '🔒'
						circle.appendChild(lock)
					}

					if (m.soon) {
						const soon = document.createElement('div')
						soon.className = 'mode-soon-ribbon'
						soon.innerText =
							currentLang === 'sk'
								? 'ČOSKORO'
								: currentLang === 'en'
									? 'SOON'
									: 'СКОРО'
						circle.appendChild(soon)
					}

					const label = document.createElement('div')
					label.className = 'mode-label'
					label.innerText = m.label

					item.appendChild(circle)
					item.appendChild(label)
					grid.appendChild(item)
				})
			}

			function handleModeClick(mode, element, event) {
				element.classList.add('pressed')
				setTimeout(() => element.classList.remove('pressed'), 300)

				if (mode.locked || mode.soon) {
					showToast(translations[currentLang].toastLocked)
					return
				}

				if (mode.id === 'classic') {
					startQuiz()
				}
			}

			function showToast(msg) {
				const toast = document.getElementById('locked-toast')
				toast.innerText = msg
				toast.classList.add('show')
				setTimeout(() => toast.classList.remove('show'), 2500)
			}

			// ДИСКЛЕЙМЕР
			function enterAsHuman() {
				document.getElementById('disclaimer-overlay').classList.add('hidden')
				initAlarmAudio()
			}

			// ЖЕСТКИЙ ПРИКОЛ С МАТЕЕМ СОЙКОЙ И ВОЗДУШНОЙ ТРЕВОГОЙ
			function enterAsSojka() {
				initAlarmAudio()
				document.getElementById('disclaimer-overlay').classList.add('hidden')

				// Включаем жесткое мигание и адский бассбуст
				document.body.classList.add('alarm-active')
				if (alarmAudio) {
					alarmAudio
						.play()
						.catch(e => console.log('Audio play blocked by browser'))
				}

				// Добавляем безумную надпись поверх всего
				const killText = document.createElement('div')
				killText.style.position = 'fixed'
				killText.style.inset = '0'
				killText.style.display = 'flex'
				killText.style.alignItems = 'center'
				killText.style.justifyContent = 'center'
				killText.style.fontSize = '3rem'
				killText.style.fontFamily = 'Bungee'
				killText.style.color = '#fff'
				killText.style.zIndex = '99999'
				killText.innerText = '🚨 MATEJ SOJKA IS HERE 🚨'
				document.body.appendChild(killText)
			}

			// КЛИК ПО СОЙКЕ
			function handleSojkaClick() {
				matejClicks++
				const secretText = document.getElementById('secret-level-text')

				if (matejClicks === 5) {
					secretText.classList.remove('hidden')
					secretText.innerText =
						currentLang === 'sk'
							? '🔓 TAJNÝ REŽIM AKTIVOVANÝ!'
							: currentLang === 'en'
								? '🔓 SECRET MODE ACTIVATED!'
								: '🔓 СЕКРЕТНЫЙ РЕЖИМ АКТИВИРОВАН!'
					document.getElementById('screen-home').classList.add('psychedelic')
				}
			}

			// КНОПКА СБЕЖАТЬ УБЕГАЕТ
			function runAway(btn) {
				const x = Math.random() * (window.innerWidth - btn.offsetWidth - 40)
				const y = Math.random() * (window.innerHeight - btn.offsetHeight - 40)
				btn.style.position = 'fixed'
				btn.style.left = `${x}px`
				btn.style.top = `${y}px`
			}

			// ЛОГИКА ТЕСТА
			function startQuiz() {
				currentQuestionIndex = 0
				score = 0
				showScreen('screen-quiz')
				showQuestion()
			}

			function showQuestion() {
				const qList = questionsData[currentLang]
				if (currentQuestionIndex >= qList.length) {
					finishQuiz()
					return
				}

				const qData = qList[currentQuestionIndex]

				let counterStr = translations[currentLang].counter
				counterStr = counterStr
					.replace('{x}', currentQuestionIndex + 1)
					.replace('{y}', qList.length)
				document.getElementById('quiz-counter').innerText = counterStr

				document.getElementById('quiz-question').innerText = qData.q

				const answersBox = document.getElementById('quiz-answers')
				answersBox.innerHTML = ''

				qData.a.forEach((ans, idx) => {
					const btn = document.createElement('button')
					btn.className = 'answer-btn'
					btn.innerText = ans
					btn.onclick = () => handleAnswer(idx)
					answersBox.appendChild(btn)
				})
			}

			function handleAnswer(index) {
				const qData = questionsData[currentLang][currentQuestionIndex]
				if (index === qData.correct) {
					score++
				}
				currentQuestionIndex++
				showQuestion()
			}

			function finishQuiz() {
				showScreen('screen-result')
				document.getElementById('result-title').innerText =
					translations[currentLang].resultTitle

				// Расчет фейкового IQ
				let finalIq = 70 + score * 20 + Math.floor(Math.random() * 15)
				if (score === questionsData[currentLang].length) {
					finalIq = 180 // Максималочка
				}

				document.getElementById('result-phrase').innerText =
					`IQ ${finalIq}\n\n` +
					resultsPhrases[currentLang][
						Math.min(score, resultsPhrases[currentLang].length - 1)
					]
			}

			function restartQuiz() {
				startQuiz()
			}

			function goToLobby() {
				showScreen('screen-home')
			}

			function showScreen(id) {
				;['screen-home', 'screen-quiz', 'screen-result'].forEach(s => {
					document.getElementById(s).classList.add('hidden')
				})
				document.getElementById(id).classList.remove('hidden')
			}

			/* =========================================================================
   4. ДЕКОРАЦИИ И ЗАПУСК
   ========================================================================= */
			function setupPetals() {
				const container = document.getElementById('petals')
				const count = 15
				for (let i = 0; i < count; i++) {
					const petal = document.createElement('div')
					petal.className = 'petal'
					petal.innerText = '🌸'
					petal.style.left = `${Math.random() * 100}vw`
					petal.style.fontSize = `${12 + Math.random() * 16}px`
					petal.style.animationDuration = `${6 + Math.random() * 8}s`
					petal.style.animationDelay = `${Math.random() * 5}s`
					container.appendChild(petal)
				}
			}

			// Случайная фотка Сойки на аватарку
			document.getElementById('sojka-img').src =
				sojkaPhotos[Math.floor(Math.random() * sojkaPhotos.length)]

			// Запуск
			setLanguage('ru')
			setupPetals()
		</script>
